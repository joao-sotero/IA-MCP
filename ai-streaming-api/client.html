<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-wrapper {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f7f7f8;
        }
        
        .message {
            margin: 15px 0;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message.assistant .message-content h3 {
            font-size: 16px;
            margin: 12px 0 8px 0;
            color: #667eea;
            font-weight: 600;
        }

        .message.assistant .message-content ul {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message.assistant .message-content li {
            margin: 4px 0;
            list-style-type: disc;
        }

        .message.assistant .message-content hr {
            border: none;
            border-top: 2px solid #e5e5e5;
            margin: 16px 0;
        }

        .message.assistant .message-content strong {
            font-weight: 600;
            color: #667eea;
        }

        .message.assistant .message-content p {
            margin: 8px 0;
        }
        
        .message.assistant .message-content.streaming::after {
            content: '▋';
            animation: blink 1s infinite;
            margin-left: 2px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        #input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
        }
        
        #message-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid #e5e5e5;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #message-input:focus {
            border-color: #667eea;
        }
        
        button {
            padding: 12px 24px;
            font-size: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #clear-button {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            font-size: 13px;
        }
        
        #chat-container::-webkit-scrollbar {
            width: 8px;
        }
        
        #chat-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        #chat-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        
        #chat-container::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <h1>🤖 AI Chat Assistant</h1>
            <p>Faça suas perguntas e receba respostas em tempo real</p>
            <button id="clear-button" onclick="clearChat()">🔄 Nova Conversa</button>
        </div>
        
        <div id="chat-container"></div>
        
        <div id="input-container">
            <input 
                type="text" 
                id="message-input" 
                placeholder="Digite sua mensagem..." 
                autocomplete="off"
            />
            <button id="send-button" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        
        let currentAssistantMessage = null;
        let isStreaming = false;
        let fullMarkdownText = '';

        function formatMarkdown(text) {
            if (!text) return '';
            
            let html = text;
            
            // Headers ### 
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            
            // Bold **text**
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // Horizontal rule ---
            html = html.replace(/^---$/gm, '<hr>');
            
            // Lists - item (convert to proper HTML)
            const lines = html.split('\n');
            const processed = [];
            let inList = false;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.trim().startsWith('- ')) {
                    if (!inList) {
                        processed.push('<ul>');
                        inList = true;
                    }
                    processed.push('<li>' + line.trim().substring(2) + '</li>');
                } else {
                    if (inList) {
                        processed.push('</ul>');
                        inList = false;
                    }
                    processed.push(line);
                }
            }
            if (inList) {
                processed.push('</ul>');
            }
            
            html = processed.join('\n');
            
            // Paragraphs (double line break)
            html = html.split('\n\n').map(para => {
                if (!para.trim()) return '';
                if (para.includes('<h3>') || para.includes('<ul>') || para.includes('<hr>')) {
                    return para;
                }
                return `<p>${para.replace(/\n/g, '<br>')}</p>`;
            }).join('');
            
            return html;
        }

        function addMessage(text, isUser, isStreaming = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (isStreaming) {
                contentDiv.classList.add('streaming');
            }
            
            if (isUser) {
                contentDiv.textContent = text;
            } else {
                contentDiv.innerHTML = formatMarkdown(text);
            }
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
            
            return contentDiv;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function setInputState(disabled) {
            messageInput.disabled = disabled;
            sendButton.disabled = disabled;
            isStreaming = disabled;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            setInputState(true);

            addMessage(message, true);
            messageInput.value = '';

            currentAssistantMessage = addMessage('', false, true);
            fullMarkdownText = '';

            try {
                const response = await fetch('http://localhost:3000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            if (data.content) {
                                fullMarkdownText += data.content;
                                currentAssistantMessage.innerHTML = formatMarkdown(fullMarkdownText);
                                scrollToBottom();
                            } else if (data.done) {
                                currentAssistantMessage.classList.remove('streaming');
                            }
                        }
                    }
                }

                if (currentAssistantMessage) {
                    currentAssistantMessage.classList.remove('streaming');
                    currentAssistantMessage.innerHTML = formatMarkdown(fullMarkdownText);
                }

            } catch (error) {
                console.error('Error:', error);
                currentAssistantMessage.innerHTML = '<p>❌ Erro ao conectar com a API</p>';
            } finally {
                setInputState(false);
                messageInput.focus();
                currentAssistantMessage = null;
                fullMarkdownText = '';
            }
        }

        async function clearChat() {
            if (confirm('Iniciar uma nova conversa? O histórico será limpo.')) {
                await fetch('http://localhost:3000/api/chat', { method: 'DELETE' });
                chatContainer.innerHTML = '';
                addMessage('Olá! Sou seu assistente de IA. Como posso ajudar você hoje?', false);
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                sendMessage();
            }
        });

        messageInput.focus();

        window.addEventListener('load', () => {
            setTimeout(() => {
                addMessage('Olá! Sou seu assistente de IA. Como posso ajudar você hoje?', false);
            }, 500);
        });
    </script>
</body>
</html>
